<!doctype html>
<html lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>الصورة</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: #000;
        color: #111;
        position: relative;
        overflow-x: hidden;
      }
      body::before {
        content: "";
        position: fixed;
        inset: -20px;
        background: url("d85.jpg") center / cover no-repeat;
        filter: blur(12px) brightness(0.85);
        z-index: 0;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: linear-gradient(160deg, rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.15));
        z-index: 0;
      }
      .wrap {
        max-width: 900px;
        margin: 32px auto 0;
        padding: 24px 16px 0;
        text-align: center;
        position: relative;
        z-index: 1;
      }
      img {
        width: 100%;
        height: auto;
        max-width: 720px;
        border-radius: 12px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
      }
      .laugh {
        margin-top: 14px;
        font-size: 16px;
        color: #fff;
        letter-spacing: 1px;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      }
      .socials {
        margin-top: 14px;
        margin-bottom: 0;
        display: flex;
        justify-content: center;
        gap: 12px;
      }
      .social {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .social:focus-visible,
      .social:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.45);
      }
      .social.snap {
        background: #fffc00;
      }
      .social.tiktok {
        background: #000;
      }
      .social svg {
        width: 30px;
        height: 30px;
        display: block;
      }
      .social.snap svg {
        filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.25));
      }
      .social.tiktok svg {
        filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.55));
      }
      @media (max-width: 600px) {
        .wrap {
          margin: 16px auto 0;
          padding: 16px 12px 0;
        }
        img {
          max-width: 100%;
        }
        .social {
          width: 46px;
          height: 46px;
        }
        .social svg {
          width: 26px;
          height: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="d85.jpg" alt="الصورة" />
      <div class="laugh">القم</div>
      <div class="socials">
        <a class="social snap" href="https://www.snapchat.com/add/h.nalshammari" target="_blank" rel="noopener" aria-label="Snapchat">
          <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
            <path
              fill="#fff"
              stroke="#000"
              stroke-width="2"

            />
          </svg>
        </a>
        <a class="social tiktok" href="https://www.tiktok.com/@h.nalshammari" target="_blank" rel="noopener" aria-label="TikTok">
          <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
            <path
              fill="#25F4EE"
              d="M36 10c1.8 3.7 4.9 6.6 8.7 8.1 1.7.7 3.6 1.1 5.5 1.2v7.1c-3.6-.1-7.1-1-10.3-2.6v17.7c0 7.8-6.4 14.1-14.2 14.1-7.9 0-14.3-6.3-14.3-14.1 0-7.8 6.4-14.2 14.3-14.2 1.5 0 3 .2 4.4.7v7.6c-1.3-.7-2.8-1-4.4-1-3.7 0-6.7 3-6.7 6.8 0 3.7 3 6.7 6.7 6.7 3.7 0 6.7-3 6.7-6.7V10h6.6z"
            />

              fill="#FE2C55"
              d="M39 10h4.7c1.8 3.7 4.9 6.6 8.7 8.1v4.4c-3.3-.2-6.5-1.2-9.3-2.9v17.9c0 7.8-6.4 14.1-14.2 14.1-4.8 0-9-2.3-11.6-5.8 2.6 1.6 5.8 2 8.8.9 3.3-1.2 5.4-4.4 5.4-7.8V10h7.5z"
              opacity="0.85"
            />
            <path
              fill="#fff"
              d="M39 10c1.8 3.7 4.9 6.6 8.7 8.1 1.6.6 3.3 1 5.1 1.1v4.4c-3.6-.1-7.1-1-10.3-2.6v17.7c0 7.8-6.4 14.1-14.2 14.1-4.1 0-7.8-1.7-10.4-4.4 2.2 1.2 4.7 1.5 7.1.7 3.3-1.1 5.6-4.3 5.6-7.8V10h6.4z"
              opacity="0.9"
            />

        </a>
      </div>
    </div>
  </body>
</html>
