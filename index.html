<!doctype html>
<html lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>الصورة</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: url("44e.png") center / cover no-repeat fixed;
        color: #111;
      }
      .wrap {
        max-width: 900px;
        margin: 40px auto;
        padding: 24px 16px;
        text-align: center;
      }
      img {
        width: 100%;
        height: auto;
        max-width: 720px;
        border-radius: 12px;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
      }
      .laugh {
        margin-top: 14px;
        font-size: 16px;
        color: #fff;
        letter-spacing: 1px;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      }
      @media (max-width: 600px) {
        .wrap {
          margin: 16px auto;
          padding: 16px 12px;
        }
        img {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="d85.jpg" alt="الصورة" />
      <div class="laugh">هههههههههههههههههههههههههههههههههههههههه</div>
    </div>
  </body>
</html>
